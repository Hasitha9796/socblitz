name: socblitz

# ─────────────────────────────────────────────────────────────────────────────
# SocBlitz — Complete self-contained SOC platform
#
# VERSION LOCK (verified compatible):
#   Wazuh       4.14.5  (manager + indexer — same version mandatory)
#   Graylog     6.1     (native arm64 + amd64)
#   OpenSearch  2.19.0  (for Graylog — DO NOT upgrade to 3.x, it breaks Graylog)
#   MongoDB     7.0     (for Graylog — native arm64 + amd64)
#   Grafana     11.3.0  (native arm64 + amd64)
#   InfluxDB    2.7     (native arm64 + amd64)
#
# ARM64 NOTE:
#   Wazuh manager + indexer images are amd64-only (no native arm64 build exists).
#   They run via QEMU emulation on ARM64. This works but uses ~2x RAM.
#   Minimum recommended RAM on ARM64:  8 GB
#   Minimum recommended RAM on amd64:  6 GB
#   All other services have native arm64 images and run natively.
#
# First time:  ./setup.sh
# After that:  docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  WAZUH 4.14.5                                                            ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    hostname: wazuh-manager
    container_name: socblitz-wazuh-manager
    restart: unless-stopped
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 655360, hard: 655360 }
    ports:
      - "1514:1514"        # Agent syslog / remoted
      - "1515:1515"        # Agent enrollment
      - "514:514/udp"      # Syslog ingest
      - "55000:55000"      # Wazuh REST API
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD:-SecretPassword}
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${WAZUH_MANAGER_PASSWORD:-MyS3cr37P450r.*-}
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/wazuh-manager.pem
      - SSL_KEY=/etc/ssl/wazuh-manager-key.pem
    volumes:
      - wazuh-api-config:/var/ossec/api/configuration
      - wazuh-etc:/var/ossec/etc
      - wazuh-logs:/var/ossec/logs
      - wazuh-queue:/var/ossec/queue
      - wazuh-var-multigroups:/var/ossec/var/multigroups
      - wazuh-integrations:/var/ossec/integrations
      - wazuh-active-response:/var/ossec/active-response/bin
      - wazuh-agentless:/var/ossec/agentless
      - wazuh-wodles:/var/ossec/wodles
      - ./config/wazuh_certs/root-ca.pem:/etc/ssl/root-ca.pem
      - ./config/wazuh_certs/wazuh-manager.pem:/etc/ssl/wazuh-manager.pem
      - ./config/wazuh_certs/wazuh-manager-key.pem:/etc/ssl/wazuh-manager-key.pem
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
    networks: [socblitz-net]
    depends_on:
      wazuh-indexer:
        condition: service_healthy

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.5
    hostname: wazuh-indexer
    container_name: socblitz-wazuh-indexer
    restart: unless-stopped
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    environment:
      # ARM64 via QEMU: JVM uses ~2x RAM — use 2g heap minimum on ARM64
      # On native amd64: 1g heap is fine. Change to -Xms1g -Xmx1g on amd64.
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD:-SecretPassword}
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ./config/wazuh_certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh-indexer.pem
      - ./config/wazuh_certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh-indexer.key
      - ./config/wazuh_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ./config/wazuh_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin.key
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      # 4.14.5 new path: config/opensearch-security/ (was opensearch-security/)
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml
      - ./config/wazuh_indexer/entrypoint.sh:/entrypoint.sh
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:${WAZUH_INDEXER_PASSWORD:-SecretPassword} https://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s    # longer on ARM64 due to JVM emulation startup time

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  GRAYLOG 6.1  ·  MongoDB 7.0  ·  OpenSearch 2.19.0                     ║
  # ║  All three have native arm64 + amd64 images — no emulation needed       ║
  # ║                                                                          ║
  # ║  Graylog 6.1 compatibility:                                              ║
  # ║    MongoDB:    6.0 – 7.0  ✅                                             ║
  # ║    OpenSearch: 2.x max    ✅  (3.x+ breaks Graylog — do not upgrade)    ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  graylog-mongo:
    image: mongo:7.0               # native arm64 + amd64
    container_name: socblitz-graylog-mongo
    restart: unless-stopped
    volumes:
      - graylog-mongo-data:/data/db
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  graylog-opensearch:
    image: opensearchproject/opensearch:2.19.0   # native arm64 + amd64
    container_name: socblitz-graylog-opensearch
    restart: unless-stopped
    environment:
      - cluster.name=graylog-cluster
      - node.name=graylog-opensearch
      - discovery.type=single-node
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true          # internal network only
      - bootstrap.memory_lock=true
      - action.auto_create_index=false
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - graylog-opensearch-data:/usr/share/opensearch/data
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  graylog:
    image: graylog/graylog:6.1     # native arm64 + amd64
    container_name: socblitz-graylog
    restart: unless-stopped
    # wait-for-it ensures OpenSearch is ready before Graylog starts
    entrypoint: /usr/bin/tini -- wait-for-it graylog-opensearch:9200 -- /docker-entrypoint.sh
    environment:
      - GRAYLOG_NODE_ID_FILE=/usr/share/graylog/data/config/node-id
      - GRAYLOG_HTTP_BIND_ADDRESS=0.0.0.0:9000
      - GRAYLOG_MONGODB_URI=mongodb://graylog-mongo:27017/graylog
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://graylog-opensearch:9200
      - GRAYLOG_PASSWORD_SECRET=${GRAYLOG_PASSWORD_SECRET:-yourmustchangethispasswordsecret}
      # SHA2 of password. Default = "admin". Generate: echo -n "pass" | sha256sum
      - GRAYLOG_ROOT_PASSWORD_SHA2=${GRAYLOG_ROOT_PASSWORD_SHA2:-8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918}
      - GRAYLOG_HTTP_EXTERNAL_URI=http://localhost:9000/
    ports:
      - "9000:9000"           # Graylog web UI + REST API
      - "5044:5044"           # Beats input
      - "5140:5140/udp"       # Syslog UDP
      - "5140:5140"           # Syslog TCP
      - "12201:12201/udp"     # GELF UDP
      - "12201:12201"         # GELF TCP
    volumes:
      - graylog-data:/usr/share/graylog/data
    networks: [socblitz-net]
    depends_on:
      graylog-mongo:
        condition: service_healthy
      graylog-opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/lbstatus | grep -q ALIVE"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  GRAFANA 11.3.0  ·  InfluxDB 2.7                                        ║
  # ║  Both native arm64 + amd64                                               ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  grafana:
    image: grafana/grafana:11.3.0  # native arm64 + amd64
    container_name: socblitz-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-SocBlitz@Grafana1}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7            # native arm64 + amd64
    container_name: socblitz-influxdb
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-SocBlitz@Influx1}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-socblitz}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-socblitz}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-socblitz-influx-token-change-me}
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks: [socblitz-net]

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  SOCBLITZ APPLICATION                                                    ║
  # ║  postgres · redis · minio all native arm64 + amd64                      ║
  # ║  backend · frontend · worker · beat built locally — any arch            ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  postgres:
    image: postgres:16-alpine      # native arm64 + amd64
    container_name: socblitz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-socblitz}
      POSTGRES_USER:     ${POSTGRES_USER:-socblitz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SocBlitz@Postgres1}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socblitz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine          # native arm64 + amd64
    container_name: socblitz-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-SocBlitz@Redis1} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-SocBlitz@Redis1}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest      # native arm64 + amd64
    container_name: socblitz-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-socblitz}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-SocBlitz@Minio1}
    ports:
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks: [socblitz-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile       # builds natively on any arch
    container_name: socblitz-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      minio:    { condition: service_started }
    volumes:
      - ./data/logs:/app/logs
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile       # builds natively on any arch
    container_name: socblitz-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    depends_on: [backend]
    networks: [socblitz-net]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socblitz-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,integrations,alerts
    env_file: .env
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks: [socblitz-net]

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socblitz-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule=/app/data/celery/celerybeat-schedule
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ./data/celery:/app/data/celery
    networks: [socblitz-net]

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  MISP  ·  Threat Intelligence Platform                                  ║
  # ║  MariaDB 10.11 is MISP-specific — separate from SocBlitz postgres       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  misp-db:
    image: mariadb:10.11
    container_name: socblitz-misp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      misp
      MYSQL_USER:          misp
      MYSQL_PASSWORD:      ${MISP_DB_PASSWORD:-SocBlitz@MISPdb1}
      MYSQL_ROOT_PASSWORD: ${MISP_DB_ROOT_PASSWORD:-SocBlitz@MISProot1}
    volumes:
      - misp-db-data:/var/lib/mysql
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: socblitz-misp
    restart: unless-stopped
    environment:
      - MISP_BASEURL=https://localhost:8091
      - MISP_ADMIN_EMAIL=${MISP_ADMIN_EMAIL:-admin@admin.test}
      - MISP_ADMIN_PASSPHRASE=${MISP_ADMIN_PASSWORD:-SocBlitz@MISP1!}
      - ADMIN_KEY=${MISP_API_KEY:-1HwWgPQcMxoYZeQbe3Agjze6mFwgVcOgmxLZftcs}
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=${MISP_DB_PASSWORD:-SocBlitz@MISPdb1}
      - MYSQL_ROOT_PASSWORD=${MISP_DB_ROOT_PASSWORD:-SocBlitz@MISProot1}
      - REDIS_FQDN=redis
      - REDIS_DATABASE=2
      - REDIS_PASSWORD=${REDIS_PASSWORD:-SocBlitz@Redis1}
    ports:
      - "8090:80"      # HTTP (redirects to HTTPS)
      - "8091:443"     # HTTPS web UI
    volumes:
      - misp-data:/var/www/MISP
    networks: [socblitz-net]
    depends_on:
      misp-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost/users/login -o /dev/null -w '%{http_code}' | grep -qE '200|302'"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 300s   # MISP first-boot DB init takes 3-5 minutes

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  VELOCIRAPTOR  ·  DFIR endpoint forensics & artifact collection         ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  velociraptor:
    image: wlambert/velociraptor:latest
    container_name: socblitz-velociraptor
    restart: unless-stopped
    environment:
      - VELOX_FRONTEND_HOSTNAME=velociraptor
      - VELOX_SERVER_URL=https://velociraptor:8000/
      - VELOX_USER=${VELOCIRAPTOR_USER:-admin}
      - VELOX_PASSWORD=${VELOCIRAPTOR_PASSWORD:-SocBlitz@Velociraptor1}
      - VELOX_ROLE=administrator
    ports:
      - "8889:8889"    # GUI / REST API (HTTPS)
      - "8010:8000"    # Agent enrollment port (host 8010 → container 8000)
    volumes:
      - velociraptor-data:/velociraptor   # working dir where config + data live
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:8889/ -o /dev/null -w '%{http_code}' | grep -qE '200|301|302|307|401'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

# ─────────────────────────────────────────────────────────────────────────────

volumes:
  wazuh-api-config:
  wazuh-etc:
  wazuh-logs:
  wazuh-queue:
  wazuh-var-multigroups:
  wazuh-integrations:
  wazuh-active-response:
  wazuh-agentless:
  wazuh-wodles:
  wazuh-indexer-data:
  graylog-mongo-data:
  graylog-opensearch-data:
  graylog-data:
  grafana-data:
  influxdb-data:
  postgres-data:
  redis-data:
  minio-data:
  misp-db-data:
  misp-data:
  velociraptor-data:

networks:
  socblitz-net:
    driver: bridge
