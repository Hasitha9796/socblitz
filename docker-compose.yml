name: socblitz

# ─────────────────────────────────────────────────────────────────────────────
# SocBlitz — Complete self-contained SOC platform
#
# VERSION LOCK (verified compatible):
#   Wazuh       4.14.5  (manager only — the OpenSearch indexer was replaced by
#                        ClickHouse; Vector ships alerts.json → ClickHouse)
#
# ARM64 NOTE:
#   The Wazuh manager image is amd64-only (no native arm64 build exists).
#   It runs via QEMU emulation on ARM64. This works but uses ~2x RAM.
#   ClickHouse, Vector, and all other services have native arm64 images.
#   Minimum recommended RAM on ARM64:  6 GB
#   Minimum recommended RAM on amd64:  4 GB
#   Dropping the JVM-based indexer for ClickHouse cuts memory and disk sharply.
#
# First time:  ./setup.sh
# After that:  docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  SOCBLITZ ENGINE  ·  custom detection engine (replaces Wazuh manager)    ║
  # ║  Ingests agent logs + network-device syslog → decode → rules → ClickHouse ║
  # ║  No OpenSearch, no JVM. ~20 MB image.                                     ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    image: socblitz-engine:latest
    hostname: engine
    container_name: socblitz-engine
    restart: unless-stopped
    ports:
      - "514:5514/udp"     # network-device syslog (UDP) → engine
      - "514:5514/tcp"     # network-device syslog (TCP) → engine
      - "8095:8090"        # agent ingest + management API (8090 host port is taken by MISP)
    environment:
      CLICKHOUSE_URL:      http://clickhouse:8123
      CLICKHOUSE_USER:     ${CLICKHOUSE_USER:-socblitz}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-SocBlitz@Click1}
      AGENT_ENROLL_KEY:    ${AGENT_ENROLL_KEY:-changeme-enroll-key}
      # Bind syslog on a high port (container runs unprivileged); host maps 514→5514.
      ENGINE_SYSLOG_UDP:   ":5514"
      ENGINE_SYSLOG_TCP:   ":5514"
    networks: [socblitz-net]
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8090/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── socblitz-agent (demo) ──────────────────────────────────────────────────
  # Real agents run on your endpoints (Win/Linux/mac). This optional in-stack
  # instance tails the host's /var/log and does FIM on /etc, to exercise the
  # pipeline. Start with:  docker compose --profile agent-demo up -d agent
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: socblitz-agent:latest
    container_name: socblitz-agent
    restart: unless-stopped
    profiles: ["agent-demo"]
    environment:
      ENGINE_URL:         http://engine:8090
      AGENT_ENROLL_KEY:   ${AGENT_ENROLL_KEY:-changeme-enroll-key}
      AGENT_NAME:         demo-endpoint
      AGENT_LOG_FILES:    /host/log/auth.log,/host/log/syslog
      AGENT_JOURNALD:     "false"
      AGENT_FIM_PATHS:    /host/etc
      AGENT_FIM_INTERVAL: 60s
      AGENT_INV_INTERVAL: 1h
    volumes:
      - /var/log:/host/log:ro
      - /etc:/host/etc:ro
    networks: [socblitz-net]
    depends_on:
      engine:
        condition: service_healthy

  # ── ClickHouse — analytics store (replaces the Wazuh Indexer/OpenSearch) ────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine   # native arm64 + amd64
    hostname: clickhouse
    container_name: socblitz-clickhouse
    restart: unless-stopped
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    environment:
      CLICKHOUSE_USER:     ${CLICKHOUSE_USER:-socblitz}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-SocBlitz@Click1}
      CLICKHOUSE_DB:       wazuh
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Any .sql here runs once on an empty data dir — creates the tables.
      - ./config/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [socblitz-net]
    healthcheck:
      # 127.0.0.1 (not localhost): on IPv6-disabled hosts localhost resolves to
      # ::1, but ClickHouse binds IPv4 only, so localhost probes get refused.
      test: ["CMD-SHELL", "wget -q -O - 'http://127.0.0.1:8123/ping' | grep -q Ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  SOCBLITZ APPLICATION                                                    ║
  # ║  postgres · redis · minio all native arm64 + amd64                      ║
  # ║  backend · frontend · worker · beat built locally — any arch            ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  postgres:
    image: postgres:16-alpine      # native arm64 + amd64
    container_name: socblitz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-socblitz}
      POSTGRES_USER:     ${POSTGRES_USER:-socblitz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SocBlitz@Postgres1}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socblitz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine          # native arm64 + amd64
    container_name: socblitz-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-SocBlitz@Redis1} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-SocBlitz@Redis1}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest      # native arm64 + amd64
    container_name: socblitz-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-socblitz}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-SocBlitz@Minio1}
    ports:
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks: [socblitz-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile       # builds natively on any arch
    container_name: socblitz-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      minio:    { condition: service_started }
    volumes:
      - ./data/logs:/app/logs
      - ./deployment:/app/deployment:ro            # unified agent installer templates
      - velociraptor-data:/velociraptor-data:ro    # serve version-matched velociraptor binary
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile       # builds natively on any arch
    container_name: socblitz-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    depends_on: [backend]
    networks: [socblitz-net]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socblitz-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,integrations,alerts
    env_file: .env
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks: [socblitz-net]

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socblitz-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule=/app/data/celery/celerybeat-schedule
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ./data/celery:/app/data/celery
    networks: [socblitz-net]

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  MISP  ·  Threat Intelligence Platform                                  ║
  # ║  MariaDB 10.11 is MISP-specific — separate from SocBlitz postgres       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  misp-db:
    image: mariadb:10.11
    container_name: socblitz-misp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      misp
      MYSQL_USER:          misp
      MYSQL_PASSWORD:      ${MISP_DB_PASSWORD:-SocBlitz@MISPdb1}
      MYSQL_ROOT_PASSWORD: ${MISP_DB_ROOT_PASSWORD:-SocBlitz@MISProot1}
    volumes:
      - misp-db-data:/var/lib/mysql
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: socblitz-misp
    restart: unless-stopped
    environment:
      - MISP_BASEURL=https://localhost:8091
      - MISP_ADMIN_EMAIL=${MISP_ADMIN_EMAIL:-admin@admin.test}
      - MISP_ADMIN_PASSPHRASE=${MISP_ADMIN_PASSWORD:-SocBlitz@MISP1!}
      - ADMIN_KEY=${MISP_API_KEY:-1HwWgPQcMxoYZeQbe3Agjze6mFwgVcOgmxLZftcs}
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=${MISP_DB_PASSWORD:-SocBlitz@MISPdb1}
      - MYSQL_ROOT_PASSWORD=${MISP_DB_ROOT_PASSWORD:-SocBlitz@MISProot1}
      - REDIS_FQDN=redis
      - REDIS_DATABASE=2
      - REDIS_PASSWORD=${REDIS_PASSWORD:-SocBlitz@Redis1}
    ports:
      - "8090:80"      # HTTP (redirects to HTTPS)
      - "8091:443"     # HTTPS web UI
    volumes:
      - misp-data:/var/www/MISP
    networks: [socblitz-net]
    depends_on:
      misp-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost/users/login -o /dev/null -w '%{http_code}' | grep -qE '200|302'"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 300s   # MISP first-boot DB init takes 3-5 minutes

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  OLLAMA  ·  Local LLM for the agentic dashboard (no cloud dependency)   ║
  # ║  Default model llama3.2:1b (~1.3 GB) — small enough for CPU inference.  ║
  # ║  Change via OLLAMA_MODEL in .env (also update LOCAL_LLM_MODEL to match).║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  ollama:
    image: ollama/ollama:latest    # native arm64 + amd64
    container_name: socblitz-ollama
    restart: unless-stopped
    # Start the server, then pull the chat + embedding models (no-op when cached)
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5; ollama pull ${OLLAMA_MODEL:-llama3.2:1b}; ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}; wait"]
    environment:
      - OLLAMA_KEEP_ALIVE=30m
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  VELOCIRAPTOR  ·  DFIR endpoint forensics & artifact collection         ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  velociraptor:
    image: wlambert/velociraptor:latest
    container_name: socblitz-velociraptor
    restart: unless-stopped
    environment:
      - VELOX_FRONTEND_HOSTNAME=velociraptor
      - VELOX_SERVER_URL=https://velociraptor:8000/
      - VELOX_USER=${VELOCIRAPTOR_USER:-admin}
      - VELOX_PASSWORD=${VELOCIRAPTOR_PASSWORD:-SocBlitz@Velociraptor1}
      - VELOX_ROLE=administrator
    ports:
      - "8889:8889"    # GUI / REST API (HTTPS)
      - "8010:8000"    # Agent enrollment port (host 8010 → container 8000)
    volumes:
      - velociraptor-data:/velociraptor   # working dir where config + data live
    networks: [socblitz-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:8889/ -o /dev/null -w '%{http_code}' | grep -qE '200|301|302|307|401'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

# ─────────────────────────────────────────────────────────────────────────────

volumes:
  clickhouse-data:
  postgres-data:
  redis-data:
  minio-data:
  misp-db-data:
  misp-data:
  ollama-data:
  velociraptor-data:

networks:
  socblitz-net:
    driver: bridge
