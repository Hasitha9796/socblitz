<!-- Wazuh Manager config — 4.14.5 (no filebeat, direct indexer connection) -->
<ossec_config>

  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- Send alerts to Wazuh Indexer (4.14.5 — direct, no filebeat) -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://wazuh-indexer:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/ssl/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/ssl/wazuh-manager.pem</certificate>
      <key>/etc/ssl/wazuh-manager-key.pem</key>
    </ssl>
  </indexer>

  <!-- Forward alerts to SocBlitz SOAR webhook -->
  <integration>
    <name>custom-socblitz</name>
    <hook_url>http://socblitz-backend:5000/api/v1/soar/trigger/wazuh-alert</hook_url>
    <level>7</level>
    <alert_format>json</alert_format>
  </integration>

  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
  </remote>

  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
  </auth>

  <cluster>
    <name>wazuh</name>
    <node_name>wazuh-manager</node_name>
    <node_type>master</node_type>
    <key>c98b62a9b0469c9032f2dbae80d3f68e</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>wazuh-manager</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

</ossec_config>
