# SocBlitz engine decoders — Wazuh 5.0 decoder asset shape, restructured for
# SocBlitz (regex `parse|<field>` extraction instead of HLP/logpar).
#
#   name:            decoder/<module>/<version>
#   metadata:        module/title/description/compatibility/author/references
#   parents:         [decoder/<parent>/0]   # optional; only run if a parent matched
#   check:           { field: value | /regex/ }   # gate: all must pass
#   parse|<field>:   ordered regex; first match's (?P<name>…) groups become fields
#   normalize:       - map: { field: value }   [ - check: {…}  map: {…} ]
#
# One decoder per YAML document (separated by ---).

name: decoder/sshd/0
metadata:
  module: sshd
  title: OpenSSH authentication events
  description: Extracts user and source IP from SSH login success/failure
  compatibility: OpenSSH 7.x and later
  author:
    name: SocBlitz
    date: 2026/07/12
  references:
    - https://man.openbsd.org/sshd
check:
  program: sshd
parse|message:
  - 'Failed password for (?:invalid user )?(?P<dstuser>\S+) from (?P<srcip>\d{1,3}(?:\.\d{1,3}){3})'
  - 'Accepted password for (?P<dstuser>\S+) from (?P<srcip>\d{1,3}(?:\.\d{1,3}){3})'
normalize:
  - map:
      event.category: authentication
      event.module: sshd
  - check:
      dstuser: root
    map:
      event.severity: high
---
name: decoder/sudo/0
metadata:
  module: sudo
  title: sudo command execution
  description: Extracts the invoking user and executed command
  compatibility: sudo 1.8+
  author:
    name: SocBlitz
    date: 2026/07/12
  references: []
check:
  program: sudo
parse|message:
  - '(?P<dstuser>\S+)\s+:.*COMMAND=(?P<command>.*)$'
normalize:
  - map:
      event.category: privilege_escalation
      event.module: sudo
---
name: decoder/iptables/0
metadata:
  module: iptables
  title: Netfilter/iptables packet log
  description: Extracts source IP and destination port from kernel firewall logs
  compatibility: Linux netfilter
  author:
    name: SocBlitz
    date: 2026/07/12
  references: []
check:
  program: kernel
parse|message:
  - 'SRC=(?P<srcip>\d{1,3}(?:\.\d{1,3}){3}).*DPT=(?P<dstport>\d+)'
normalize:
  - map:
      event.category: network
      event.module: iptables
