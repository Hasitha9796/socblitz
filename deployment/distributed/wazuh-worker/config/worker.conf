<!-- Wazuh Manager 4.14.5 — WORKER node (DISTRIBUTED deployment)

     One copy of this bundle per worker host. Before starting, replace:
       {{NODE_NAME}}      unique per worker: wazuh-worker-1, wazuh-worker-2, ...
                          (must match this node's cert CN in certs.yml)
       {{INDEXER_*_IP}}   indexer host IPs
       {{APP_TIER_IP}}    SocBlitz app host IP
       {{MASTER_IP}}      the master host's IP
       CLUSTER_KEY_CHANGE_ME   same key as the master
-->
<ossec_config>

  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://{{INDEXER_1_IP}}:9200</host>
      <host>https://{{INDEXER_2_IP}}:9200</host>
      <host>https://{{INDEXER_3_IP}}:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/ssl/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/ssl/wazuh-manager.pem</certificate>
      <key>/etc/ssl/wazuh-manager-key.pem</key>
    </ssl>
  </indexer>

  <!-- Alerts fire on the node managing the agent — every worker needs the
       webhook, not just the master. Level 12+: see deployment/README.md -->
  <integration>
    <name>custom-socblitz</name>
    <hook_url>http://{{APP_TIER_IP}}:5000/api/v1/soar/trigger/wazuh-alert</hook_url>
    <level>12</level>
    <alert_format>json</alert_format>
  </integration>

  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- Enrollment happens on the master only -->
  <auth>
    <disabled>yes</disabled>
  </auth>

  <cluster>
    <name>socblitz-wazuh</name>
    <node_name>{{NODE_NAME}}</node_name>
    <node_type>worker</node_type>
    <key>CLUSTER_KEY_CHANGE_ME</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>{{MASTER_IP}}</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>no</disabled>
  </cluster>

</ossec_config>
