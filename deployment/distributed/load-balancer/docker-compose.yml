name: socblitz-wazuh-lb

# ─────────────────────────────────────────────────────────────────────────────
# SocBlitz DISTRIBUTED — agent traffic load balancer (one small host)
#
#   1. Edit nginx.conf — replace {{MASTER_IP}} / {{WORKER_*_IP}} placeholders
#      (remove upstream lines for workers you don't have)
#   2. docker compose up -d
#
# This host's address is the ONLY address agents (and the agent installer
# scripts) are configured with. For HA, run two of these with keepalived/VRRP
# or put a cloud NLB in front instead.
# ─────────────────────────────────────────────────────────────────────────────

services:
  wazuh-lb:
    image: nginx:1.27-alpine
    container_name: socblitz-wazuh-lb
    restart: unless-stopped
    ports:
      - "1514:1514"
      - "1515:1515"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
