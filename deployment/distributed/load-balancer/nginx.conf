# SocBlitz DISTRIBUTED — nginx TCP load balancer for Wazuh agent traffic.
# Replace the {{WORKER_*_IP}} / {{MASTER_IP}} placeholders with real host IPs.
# Agents are configured with THIS host's address as their manager.
worker_processes auto;

events {
    worker_connections 65536;
}

stream {
    # Agent events — spread across worker hosts, pinned by source IP.
    # Add one line per worker host as the fleet grows.
    upstream wazuh_events {
        hash $remote_addr consistent;
        server {{WORKER_1_IP}}:1514 max_fails=3 fail_timeout=30s;
        server {{WORKER_2_IP}}:1514 max_fails=3 fail_timeout=30s;
        server {{WORKER_3_IP}}:1514 max_fails=3 fail_timeout=30s;
        server {{WORKER_4_IP}}:1514 max_fails=3 fail_timeout=30s;
    }

    # Enrollment — always the master
    upstream wazuh_enrollment {
        server {{MASTER_IP}}:1515;
    }

    server {
        listen 1514;
        proxy_pass wazuh_events;
        proxy_timeout 90s;
        proxy_connect_timeout 5s;
    }

    server {
        listen 1515;
        proxy_pass wazuh_enrollment;
        proxy_timeout 90s;
        proxy_connect_timeout 5s;
    }
}
