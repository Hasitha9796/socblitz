name: socblitz-indexer

# ─────────────────────────────────────────────────────────────────────────────
# SocBlitz DISTRIBUTED — Wazuh Indexer node
# Run one copy of this bundle on EACH of the 3+ indexer hosts.
#
# Per host:
#   1. cp .env.example .env  → set NODE_NAME, PUBLISH_HOST, SEED_HOSTS, heap
#   2. place this node's certs in ./certs/  (node.pem, node.key, root-ca.pem,
#      admin.pem, admin.key — see ../README.md "Certificates")
#   3. docker compose up -d
#
# Set SECURITY_INIT=yes in .env on wazuh-indexer-1 ONLY (first boot).
# ─────────────────────────────────────────────────────────────────────────────

services:
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.5
    container_name: socblitz-wazuh-indexer
    restart: unless-stopped
    network_mode: host          # cluster transport across hosts on 9300
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    environment:
      - NODE_NAME=${NODE_NAME:?set in .env}
      - PUBLISH_HOST=${PUBLISH_HOST:?set in .env}
      - SEED_HOSTS=${SEED_HOSTS:?set in .env}
      - INITIAL_MASTER_NODES=${INITIAL_MASTER_NODES:-wazuh-indexer-1,wazuh-indexer-2,wazuh-indexer-3}
      - SECURITY_INIT=${SECURITY_INIT:-no}
      - "OPENSEARCH_JAVA_OPTS=${INDEXER_HEAP:--Xms16g -Xmx16g}"
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD:?set in .env}
    volumes:
      - indexer-data:/var/lib/wazuh-indexer
      - ./certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ./certs/node.pem:/usr/share/wazuh-indexer/config/certs/node.pem
      - ./certs/node.key:/usr/share/wazuh-indexer/config/certs/node.key
      - ./certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ./certs/admin.key:/usr/share/wazuh-indexer/config/certs/admin.key
      - ./config/opensearch.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      - ./config/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml
      - ./config/entrypoint.sh:/entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:${WAZUH_INDEXER_PASSWORD} https://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

volumes:
  indexer-data:
