<!-- Wazuh Manager 4.14.5 — MASTER node (multi-node cluster) -->
<ossec_config>

  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- Direct indexer connection (4.14.x, no filebeat) — all cluster nodes -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://wazuh-indexer-1:9200</host>
      <host>https://wazuh-indexer-2:9200</host>
      <host>https://wazuh-indexer-3:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/ssl/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/ssl/wazuh-manager.pem</certificate>
      <key>/etc/ssl/wazuh-manager-key.pem</key>
    </ssl>
  </indexer>

  <!-- SocBlitz SOAR webhook.
       Level 12 (not 7): the backend persists only level >= 12 alerts, and at
       cluster scale a per-alert integration at level 7 overwhelms integratord
       and the backend. Lower-level alerts are still queryable via the indexer. -->
  <integration>
    <name>custom-socblitz</name>
    <hook_url>http://backend:5000/api/v1/soar/trigger/wazuh-alert</hook_url>
    <level>12</level>
    <alert_format>json</alert_format>
  </integration>

  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- Enrollment terminates on the master (LB forwards 1515 here).
       HARDENING: for production set use_password to `yes` and provision
       /var/ossec/etc/authd.pass, then pass the key to the agent installers. -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
  </auth>

  <cluster>
    <name>socblitz-wazuh</name>
    <node_name>wazuh-master</node_name>
    <node_type>master</node_type>
    <!-- Generate with: openssl rand -hex 16 — must be identical on all nodes -->
    <key>CLUSTER_KEY_CHANGE_ME</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>wazuh-master</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>no</disabled>
  </cluster>

</ossec_config>
