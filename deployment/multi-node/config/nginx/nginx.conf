# nginx TCP load balancer for Wazuh agent traffic.
# Agents are configured with THIS address (the LB) as their manager.
worker_processes auto;

events {
    worker_connections 40960;
}

stream {
    # Agent event traffic (1514) — spread across the worker nodes.
    # hash by source address keeps an agent pinned to the same worker,
    # which avoids constant agent re-connection churn.
    upstream wazuh_events {
        hash $remote_addr consistent;
        server wazuh-worker-1:1514 max_fails=3 fail_timeout=30s;
        server wazuh-worker-2:1514 max_fails=3 fail_timeout=30s;
        # The master is deliberately NOT in this pool — keep it free for
        # cluster coordination, enrollment, and the REST API.
    }

    # Agent enrollment (1515) — always terminates on the master.
    upstream wazuh_enrollment {
        server wazuh-master:1515;
    }

    server {
        listen 1514;
        proxy_pass wazuh_events;
        proxy_timeout 90s;
        proxy_connect_timeout 5s;
    }

    server {
        listen 1515;
        proxy_pass wazuh_enrollment;
        proxy_timeout 90s;
        proxy_connect_timeout 5s;
    }
}
