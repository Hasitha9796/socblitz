# Wazuh Indexer (OpenSearch) 4.14.5 — 3-node cluster
# Shared by all three nodes: node identity comes from the NODE_NAME env var
# (OpenSearch substitutes ${VAR} from the environment), and each node's cert
# is bind-mounted to the fixed names node.pem / node.key.

network.host: "0.0.0.0"
node.name: ${NODE_NAME}
cluster.name: socblitz-wazuh-indexer

discovery.seed_hosts:
  - wazuh-indexer-1
  - wazuh-indexer-2
  - wazuh-indexer-3
cluster.initial_master_nodes:
  - wazuh-indexer-1
  - wazuh-indexer-2
  - wazuh-indexer-3

plugins.security.ssl.http.pemcert_filepath:       /usr/share/wazuh-indexer/config/certs/node.pem
plugins.security.ssl.http.pemkey_filepath:        /usr/share/wazuh-indexer/config/certs/node.key
plugins.security.ssl.http.pemtrustedcas_filepath: /usr/share/wazuh-indexer/config/certs/root-ca.pem

plugins.security.ssl.transport.pemcert_filepath:       /usr/share/wazuh-indexer/config/certs/node.pem
plugins.security.ssl.transport.pemkey_filepath:        /usr/share/wazuh-indexer/config/certs/node.key
plugins.security.ssl.transport.pemtrustedcas_filepath: /usr/share/wazuh-indexer/config/certs/root-ca.pem
plugins.security.ssl.transport.enforce_hostname_verification: false

plugins.security.ssl.http.enabled: true
plugins.security.enable_snapshot_restore_privilege: true
plugins.security.check_snapshot_restore_write_privileges: true

plugins.security.authcz.admin_dn:
  - "CN=admin,OU=Wazuh,O=Wazuh,L=California,C=US"

plugins.security.nodes_dn:
  - "CN=wazuh-indexer-1,OU=Wazuh,O=Wazuh,L=California,C=US"
  - "CN=wazuh-indexer-2,OU=Wazuh,O=Wazuh,L=California,C=US"
  - "CN=wazuh-indexer-3,OU=Wazuh,O=Wazuh,L=California,C=US"
  - "CN=wazuh-master,OU=Wazuh,O=Wazuh,L=California,C=US"
  - "CN=wazuh-worker-1,OU=Wazuh,O=Wazuh,L=California,C=US"
  - "CN=wazuh-worker-2,OU=Wazuh,O=Wazuh,L=California,C=US"

plugins.security.audit.type: internal_opensearch
compatibility.override_main_response_version: true

# Production: keep disk watermarks ENABLED (the all-in-one config disables them)
cluster.routing.allocation.disk.threshold_enabled: true
