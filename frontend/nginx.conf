server {
    listen 80;
    server_name _;
    return 302 https://$host:8443$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Docker's embedded DNS. Re-resolve `backend` every 10s instead of once at
    # startup, so recreating the backend container doesn't leave nginx proxying
    # to a dead IP (502). proxy_pass must use a variable for this to apply.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:5000;

    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets (index-<hash>.js, etc.) never change for a
    # given URL — cache them hard so repeat visits are instant.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must NEVER be cached: it's the pointer to the current bundle
    # hash. A stale index.html pins the browser to an old bundle forever (this
    # is what caused login to keep failing after a rebuild). Always revalidate.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         $backend_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json;
    gzip_min_length 1024;
}
